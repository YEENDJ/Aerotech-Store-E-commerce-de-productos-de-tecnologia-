name: Supabase Keep Alive

on:
  schedule:
    # Se ejecuta cada 3 días a las 00:00 UTC (Ajusta si quieres más o menos frecuencia)
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions de GitHub

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive request
        run: |
          # Realiza una petición GET a la tabla 'products' limitada a 1 resultado
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/products?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
